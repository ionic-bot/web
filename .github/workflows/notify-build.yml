name: Notify GitHub Pages Build
on:
    push:
        branches: [main]

permissions: {}

jobs:
    notify:
        runs-on: ubuntu-latest
        steps:
            - name: Repository Dispatch
              uses: peter-evans/repository-dispatch@v4
              with:
                  token: ${{ secrets.PAT }}
                  repository: ionic-bot/ionic-bot.github.io
                  event-type: build-time
